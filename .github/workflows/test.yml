name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# ...existing code...
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    # 1. ADD THIS BLOCK HERE (Job-level environment variables)
    env:
      DATABASE_URL: postgres://testuser:testpassword@localhost:5432/testdb

    defaults:
      run:
        working-directory: ./backend
# ...existing code...
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: backend/package.json

      - name: Install Dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Database Migrations
        # 2. REMOVE the 'env' block from here (it's now global)
        run: npx prisma db push

      - name: Run Tests
        # 3. REMOVE the 'env' block from here (it's now global)
        run: npm test